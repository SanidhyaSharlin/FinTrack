{% extends 'base.html' %}

{% block title %}Login - Expense Tracker{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="glass-card" style="width: 100%; max-width: 400px;">
        <h2 style="text-align: center; color: var(--text-main); margin-bottom: 2rem;"><i class="fa-solid fa-right-to-bracket" style="margin-right: 12px; color: var(--primary);"></i>Welcome Back</h2>
        
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.8rem; margin-top: 1rem; font-size: 1rem;">Log In</button>
        </form>
        
        <p style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.9rem;">
            Don't have an account yet? <a href="{% url 'register' %}" style="color: var(--primary); font-weight: 500; text-decoration: none;">Sign Up</a>
        </p>
    </div>
</div>
{% endblock %}
