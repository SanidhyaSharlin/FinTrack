<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Expense Tracker{% endblock %}</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Brown & Cream Palette */
            --primary: #8D6E63;        /* Soft Brown */
            --primary-hover: #5D4037;  /* Darker Brown for hover states */
            --bg-dark: #F5EFE6;        /* Cream Background */
            --glass-bg: #FFFFFF;       /* Solid White for cards */
            --glass-border: #E0D4C8;   /* Light Beige border */
            --text-main: #3E2723;      /* Deep Brown for text */
            --text-muted: #8D6E63;     /* Muted/Soft Brown */
            --success: #689F38;        /* Muted Green */
            --danger: #D32F2F;         /* Muted Red */
            
            /* Classy Typography */
            --font-display: 'Playfair Display', serif;
            --font-body: 'Poppins', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-body);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #FFFFFF;
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(62, 39, 35, 0.05);
        }

        .logo {
            font-size: 1.6rem;
            font-family: var(--font-display);
            font-weight: 700;
            color: var(--primary-hover);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            border: none;
            text-align: center;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(141, 110, 99, 0.25);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(93, 64, 55, 0.35);
            color: white;
        }

        .container {
            max-width: 1000px;
            margin: 3rem auto;
            padding: 0 1rem;
            width: 100%;
        }

        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            padding: 2.5rem;
            box-shadow: 0 4px 20px rgba(62, 39, 35, 0.05); /* Subtle brown shadow */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(62, 39, 35, 0.12); /* Deeper shadow on hover */
        }

        h1 {
            font-size: 2.2rem;
            font-family: var(--font-display);
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        h2 {
            font-size: 1.8rem;
            font-family: var(--font-display);
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-main);
        }
        
        h3 {
            font-size: 1.35rem;
            font-family: var(--font-display);
            font-weight: 600;
            color: var(--text-main);
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            border-top: 1px solid var(--glass-border);
            background-color: #FFFFFF;
        }

        /* Forms Styling */
        form p {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-size: 0.9rem;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: #FFFFFF;
            border: 1px solid var(--glass-border);
            border-radius: 0.6rem;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(141, 110, 99, 0.15);
            background-color: var(--bg-dark);
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            nav { padding: 1rem; flex-direction: column; gap: 1rem; text-align: center; }
            .nav-links { flex-wrap: wrap; justify-content: center; gap: 1rem; }
            h1 { font-size: 1.8rem; margin-bottom: 1rem; }
            h2 { font-size: 1.5rem; margin-bottom: 1rem; }
            h3 { font-size: 1.2rem; }
            .glass-card { padding: 1.5rem; border-radius: 0.8rem; }
            .container { margin: 1.5rem auto; padding: 0 0.8rem; }
            form p { margin-bottom: 1rem; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'dashboard' %}" class="logo">ExpenseTracker</a>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}">Dashboard</a>
                <a href="{% url 'add_transaction' %}" class="btn btn-primary">Add Transaction</a>
                <span style="color: var(--text-muted)">Hi, {{ user.username }}</span>
                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" style="background:none; border:none; padding:0; font:inherit; color:var(--text-main); cursor:pointer; font-weight:500; transition: color 0.3s;">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}" class="btn btn-primary">Sign Up</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        &copy; 2026 ExpenseTracker. All rights reserved.
    </footer>
</body>
</html>
